dataset:
  # Original downloaded dataset. Keep this directory unchanged so every
  # processed file can be regenerated from the same source.
  raw:
    path: data/raw/ds004504

    # Subject-level metadata table. The Group column is used to map each
    # subject_id to the class label: A, F, or C.
    participants_tsv: data/raw/ds004504/participants.tsv

    # Use the dataset-provided denoised EEG files under derivatives/.
    # The raw sub-*/eeg files are still kept on disk, but this processing
    # config reads derivatives first.
    eeg_source: derivatives

    # Glob pattern for all EEG .set files that will be converted into the
    # processed H5 dataset.
    eeg_glob: data/raw/ds004504/derivatives/sub-*/eeg/*_task-eyesclosed_eeg.set

process_raw_dataset:
  # Main output of raw-data processing. This file contains all processed
  # epochs/features, not train/val/test splits.
  rbp_epochs_h5: data/processed_raw_dataset/rbp_epochs.h5

  # Sidecar metadata for rbp_epochs_h5: source files, processing settings,
  # subject/epoch counts, label mapping, and any checksums we decide to save.
  manifest_json: data/processed_raw_dataset/rbp_epochs_manifest.json

  # RBP is the feature representation stored in rbp_epochs_h5.
  # PSD is only an intermediate calculation; RBP is the final saved feature.
  rbp:
    # Denominator range for RBP. Each band power is divided by the total
    # power inside this frequency range.
    total_power_range_hz: [0.5, 45.0]

    # Band definitions used to convert PSD into RBP features. The order here
    # should be preserved when writing the H5 band axis.
    bands:
      delta: [0.5, 4.0]
      theta: [4.0, 8.0]
      alpha: [8.0, 16.0]
      zaeta: [16.0, 24.0]
      beta: [24.0, 30.0]
      gamma: [30.0, 45.0]

  # H5 dataset schema. These are fields inside rbp_epochs_h5, not separate
  # files and not train/val/test partitions.
  h5_datasets:
    X_rbp_mean:
      dtype: float32
      shape: [n_epochs, n_bands]
      dimensions: [epoch, band]
      # Computed from X_rbp_channel by averaging over the channel dimension.
      # This is the compact feature matrix used by the paper-style model.
      description: channel-averaged RBP features for each epoch
    X_rbp_channel:
      dtype: float32
      shape: [n_epochs, n_channels, n_bands]
      dimensions: [epoch, channel, band]
      # For each epoch and channel, store one RBP value per band.
      # Example: X_rbp_channel[i, j, k] is the relative power of band k
      # for channel j in epoch i.
      description: per-channel RBP features for each epoch
    y:
      dtype: int64
      shape: [n_epochs]
      # Encoded from participants.tsv Group after matching subject_id.
      # Keep the label mapping in the manifest_json.
      description: encoded class label
    subject_id:
      dtype: string
      shape: [n_epochs]
      # Repeated per epoch so every row can be traced back to a BIDS subject.
      description: BIDS participant id for each epoch
    epoch_start_sec:
      dtype: float32
      shape: [n_epochs]
      # Start time in seconds within the source EEG recording. This keeps the
      # processed row traceable back to the original signal segment.
      description: start time of each epoch in the source EEG recording
    channel_names:
      dtype: string
      shape: [n_channels]
      description: EEG channel names stored in the channel axis order
    band_names:
      dtype: string
      shape: [n_bands]
      description: RBP band names stored in the band axis order
